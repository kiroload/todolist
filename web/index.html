<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Ultra</div>

    <button id="themeBtn" class="btn small">
      🌙
    </button>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>Build APIs. Stay Private. Stay Fast.</h1>
    <p>A modern RESTful API platform for developers</p>

    <button class="btn primary">Get Started</button>
  </section>

  <!-- Dashboard -->
  <section class="dashboard">
    <div class="dash-header">
      <h2>API Keys</h2>
      <button class="btn primary">+ New Key</button>
    </div>

    <div class="cards">

      <div class="card">
        <div>
          <h3>My Project</h3>
          <p>sk_live_xxxxxxxx</p>
          <small>120 requests</small>
        </div>

        <div class="actions">
          <button class="btn small">Copy</button>
          <button class="btn danger small">Delete</button>
        </div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
